rng_seed: 12345
community_detection:
  resolution: {min: 0.1, max: 1.0, step: 0.05}
  n_restarts: 10
network:
  weight_columns:
    - ProbLinearDist
    - ProbPoissonDist
    - LogitLinearDist100
    - LogitPoissonDist100
  sparsify: {enabled: true, min_edge_weight: 0.0001}
  min_edge_weights: [0.0, 0.0001, 0.0005, 0.001, 0.005, 0.01,  0.05, 0.1]
